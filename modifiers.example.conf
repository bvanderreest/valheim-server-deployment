#!/usr/bin/env bash
# Valheim server manager — Game modifiers and presets
# Copy this file to modifiers.conf and customise for your server.
# Reference: https://valheim.fandom.com/wiki/World_Modifiers
#            https://valheim.fandom.com/wiki/Global_Keys

########################################
#      PRESET DIFFICULTY (Optional)    #
########################################

# Applies a named difficulty baseline before any modifiers are processed.
# Passed as: -preset <value>
#
# casual    — very easy combat, no raids, ores through portals, much more resources
# easy      — slightly easier across the board
# normal    — default Valheim experience (recommended starting point)
# hard      — tougher enemies, stricter death, less resources, more raids
# hardcore  — permadeath; character deleted on death
# immersive — no map, no portals, hard combat — survival from memory and navigation
# hammer    — free building (no resource cost), passive mobs, no raids
#
# Set to "" to skip the preset and rely solely on MODIFIERS below.
PRESET="normal"

########################################
#            MODIFIERS                 #
########################################

# The 5 official vanilla -modifier categories.
# Applied on top of the preset — only the categories listed here are overridden.
# Each entry becomes: -modifier <category> <value>
#
# Combat:       veryeasy | easy | hard | veryhard
# DeathPenalty: casual | veryeasy | easy | hard | hardcore
# Resources:    muchless | less | more | muchmore | most
# Raids:        none | muchless | less | more | muchmore
# Portals:      casual | hard | veryhard

ENABLE_MODIFIERS=true
MODIFIERS=(
    "Combat=easy"
    "DeathPenalty=easy"
    "Resources=more"
    "Raids=less"
    "Portals=casual"
)

########################################
#             SETKEYS                  #
########################################

# World state toggles and numeric tuning knobs.
# Toggle keys:  uncomment the line — presence of the key enables the feature.
# Numeric keys: format is "Key=value" where 100 is always the vanilla default.
#               Each becomes: -setkey <Key> <value>
#
# These are DRASTIC, persistent world changes. They are written into the world
# save and some cannot be reversed without editing the world file directly.
# All are commented out by default — only enable what you intentionally want.

SETKEYS=(

    # --- Map & Navigation ---
    # "nomap"                # no shared map; every player navigates without a minimap

    # --- Building & Crafting ---
    # "nobuildcost"          # building structures costs no materials
    # "nocraftcost"          # crafting items costs no materials
    # "noworkbench"          # craft and build anywhere without a workbench nearby
    # "allpiecesunlocked"    # all build pieces available from the start
    # "allrecipesunlocked"   # all crafting recipes available from the start
    # "dungeonbuild"         # allow building inside dungeons (crypts, tombs, etc.)

    # --- Portals ---
    # "noportals"            # disable all portals entirely
    # "nobossportals"        # portals disabled while a boss event is active
    # "teleportall"          # block new portal construction; existing portals remain usable

    # --- Creatures ---
    # "passivemobs"          # all creatures are passive unless provoked
    # "playerevents"         # raids triggered by player proximity, not on a global timer

    # --- Death ---
    # "deathkeepequip"       # keep equipped items on death
    # "deathdeleteunequipped"# delete only unequipped items on death
    # "deathdeleteItems"     # delete all items on death
    # "deathskillsreset"     # reset all skills to 0 on death

    # --- World ---
    # "fire"                 # fire spreads and burns structures world-wide (extends Ashlands mechanic)
    # "worldlevellockedtools"# tool tier access gated by world progression level

    # --- Numeric tuning (format: "Key=value", vanilla default = 100) ---
    # "EnemyDamage=100"      # damage enemies deal to players (200 = double, 50 = half)
    # "PlayerDamage=100"     # inversely scales creature HP (200 = half HP, 50 = double HP)
    # "EventRate=100"        # raid frequency (0 = off, 200 = double rate)
    # "EnemyLevelUpRate=100" # chance of starred enemies spawning (200 = double chance)
    # "EnemySpeedSize=100"   # enemy movement speed and physical size
    # "SkillGainRate=100"    # skill XP gain speed (200 = double, 0 = frozen)
    # "SkillReductionRate=100" # skill loss on death (0 = none, 200 = double loss)
    # "StaminaRate=100"      # stamina consumption rate (0 = unlimited stamina)
    # "StaminaRegenRate=100" # stamina regeneration speed
    # "MoveStaminaRate=100"  # stamina drain from movement specifically
    # "AdrenalineRate=100"   # adrenaline buildup rate
    # "WorldLevel=100"       # world difficulty scaling level

)

########################################
#   EXTRA MODIFIERS  (advanced/mods)   #
########################################

# Applied in addition to MODIFIERS when ENABLE_EXTRA_MODIFIERS=true.
# Intended for modded servers (ValheimPlus, Jotunn-based mods) that register
# additional -modifier categories beyond the vanilla 5, or for power users who
# want a secondary override layer kept separate from the main list above.
#
# NOT needed for vanilla servers. Unrecognised categories are silently ignored
# by the base game engine but may produce warnings in the server log.

ENABLE_EXTRA_MODIFIERS=false
EXTRA_MODIFIERS=(
    # "ModCategory=value"
)

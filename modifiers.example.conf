#!/usr/bin/env bash
# Valheim server manager — Game modifiers and presets
# Reference: https://valheim.fandom.com/wiki/Dedicated_servers
#
# This file controls gameplay difficulty and features for your Valheim server.
# Modify these settings to customize your server experience without changing
# core infrastructure settings (see config.conf for those).

########################################
#       CUSTOMIZATION LEVEL            #
########################################

# Select your desired level of customization upfront
# This determines which modifier tiers will be active
# Options: "basic", "preset", "standard", "hardcore", "custom"
# - "basic": Basic modifiers only (overwrites presets)
# - "preset": Only the base preset (no additional modifiers)
# - "standard": Basic + Advanced modifiers
# - "hardcore": Basic + Advanced + Expert modifiers
# - "custom": Custom modifiers only
DEFAULT_MODIFIER_GROUP="standard"

########################################
#      PRESET DIFFICULTY (Optional)    #
########################################

# Choose a preset base (case-insensitive): casual | easy | normal | hard | hardcore | immersive | hammer
# Reference: https://valheim.fandom.com/wiki/World_Modifiers
# Presets provide a quick way to set multiple modifiers at once
PRESET="normal"

########################################
#         BOOLEAN SETKEYS              #
########################################

# Boolean setkeys that act as toggles for various features
# These are used with the -setkey flag and are typically simple on/off switches
SETKEYS=(
    "nomap"
    "nobuildcost"
    "nopassivemobs"
    "noevent"
    "noenemy"
    "noitem"
    "noportal"
    "noenemydrops"
)

########################################
#         MODIFIER TIERS               #
########################################

# Control which modifier tiers are active based on your selected customization level
# These settings are automatically configured when you select a DEFAULT_MODIFIER_GROUP
# You can override them manually if needed

# Basic modifiers that are commonly used and well understood
# These are the core gameplay settings that most server admins want to control
BASIC_MODIFIERS=(
    "Combat=easy"
    "DeathPenalty=easy"
    "Resources=more"
    "Raids=less"
    "Portals=casual"
)

# Advanced modifiers that provide more granular control over gameplay
# These are useful for experienced server admins who want fine-tuned control
ADVANCED_MODIFIERS=(
    "EnemyLevelUpRate=100"
    "ResourceRate=100"
    "StaminaRegenRate=100"
    "PlayerDamage=100"
    "EnemyDamage=100"
    "PlayerHealth=100"
    "EnemyHealth=100"
    "DungeonBuild=0"
)

# Expert modifiers that provide the most advanced control
# These are for server admins who want maximum customization
EXPERT_MODIFIERS=(
    "EnemySpeedSize=100"
    "WorldLevelLockedTools=0"
    "NoStaminaRegen=0"
    "NoFoodRegen=0"
    "NoToolDurability=0"
    "NoFireplaceFuel=0"
    "NoBuildingCost=0"
    "NoCraftingCost=0"
    "NoCookingCost=0"
    "NoFishingCost=0"
    "NoSmithingCost=0"
    "NoWoodcuttingCost=0"
    "NoMiningCost=0"
    "NoHuntingCost=0"
    "NoFarmingCost=0"
    "NoAlchemyCost=0"
    "NoConstructionCost=0"
    "NoRepairCost=0"
    "NoRepairTime=0"
    "NoCraftingTime=0"
    "NoCookingTime=0"
    "NoFishingTime=0"
    "NoSmithingTime=0"
    "NoWoodcuttingTime=0"
    "NoMiningTime=0"
    "NoHuntingTime=0"
    "NoFarmingTime=0"
    "NoAlchemyTime=0"
    "NoConstructionTime=0"
    "NoRepairTime=0"
)

# Custom modifiers that can be used to create unique server experiences
# These are for server admins who want to create their own unique gameplay
CUSTOM_MODIFIERS=(
    # Example custom modifiers - uncomment and modify as needed
    # "CustomEnemyDamage=150"
    # "CustomResourceRate=120"
    # "CustomStaminaRegenRate=80"
)

########################################
#         MODIFIER TIER CONTROL        #
######################################

# Control which modifier tiers are active
# These are automatically set based on DEFAULT_MODIFIER_GROUP selection
# You can override them manually if needed
ENABLE_BASIC_MODIFIERS=true
ENABLE_ADVANCED_MODIFIERS=false
ENABLE_EXPERT_MODIFIERS=false
ENABLE_CUSTOM_MODIFIERS=false

#!/usr/bin/env bash
# Valheim server manager — Game modifiers and presets
# Copy this file to modifiers.conf and customise for your server.
# Reference: https://valheim.fandom.com/wiki/World_Modifiers
#            https://valheim.fandom.com/wiki/Global_Keys

########################################
#       CUSTOMISATION LEVEL            #
########################################

# Choose which modifier tiers to activate.
# Options:
#   "preset"   — only the -preset flag, no extra modifiers (clean baseline)
#   "basic"    — the 5 core -modifier categories only
#   "standard" — basic modifiers (default; good for most servers)
#   "hardcore" — basic + advanced + expert modifiers
#   "custom"   — only CUSTOM_MODIFIERS (you define everything)
DEFAULT_MODIFIER_GROUP="standard"

########################################
#      PRESET DIFFICULTY (Optional)    #
########################################

# Applies a named baseline before any other modifiers.
# Passed as: -preset <value>
# Options (case-insensitive): casual | easy | normal | hard | hardcore | immersive | hammer
# Set to "" to skip the preset entirely.
PRESET="normal"

########################################
#         BASIC MODIFIERS              #
########################################

# The 5 official vanilla -modifier categories.
# Each entry becomes: -modifier <category> <value>
# Valid values are listed next to each category below.
#
#   Combat:       veryeasy | easy | hard | veryhard
#   DeathPenalty: casual | veryeasy | easy | hard | hardcore
#   Resources:    muchless | less | more | muchmore | most
#   Raids:        none | muchless | less | more | muchmore
#   Portals:      casual | hard | veryhard

BASIC_MODIFIERS=(
    "Combat=easy"
    "DeathPenalty=easy"
    "Resources=more"
    "Raids=less"
    "Portals=casual"
)

########################################
#        ADVANCED MODIFIERS            #
########################################

# Reserved for modded servers (e.g. ValheimPlus, Jotunn-based mods).
# NOT valid for a vanilla dedicated server — leave empty if unmodded.
# Each entry becomes: -modifier <category> <value>

ADVANCED_MODIFIERS=(
    # "ModCategory=value"
)

########################################
#         EXPERT MODIFIERS             #
########################################

# Reserved for modded servers only. Not valid for vanilla.
# Each entry becomes: -modifier <category> <value>

EXPERT_MODIFIERS=(
    # "ModCategory=value"
)

########################################
#         CUSTOM MODIFIERS             #
########################################

# Active when DEFAULT_MODIFIER_GROUP="custom".
# Replaces all other modifier tiers — you control everything.
# Each entry becomes: -modifier <category> <value>

CUSTOM_MODIFIERS=(
    # "Combat=hard"
    # "Resources=less"
)

########################################
#             SETKEYS                  #
########################################

# Boolean world toggles passed as: -setkey <key>
# These are DRASTIC game changes. All are commented out by default.
# Only enable keys you intentionally want active on your server.
#
#   nomap          — removes the shared map from all players
#   nobuildcost    — building requires no materials
#   nopassivemobs  — disables passive creatures (deer, birds, fish, etc.)
#   noevent        — disables random world events (raids, etc.)
#   noenemy        — disables all enemy spawning
#   noitem         — disables item drops from enemies
#   noportal       — disables all portal use
#   noenemydrops   — disables loot drops from enemies

SETKEYS=(
    # "nomap"
    # "nobuildcost"
    # "nopassivemobs"
    # "noevent"
    # "noenemy"
    # "noitem"
    # "noportal"
    # "noenemydrops"
)

########################################
#       MODIFIER TIER CONTROL          #
########################################

# Automatically configured by DEFAULT_MODIFIER_GROUP above.
# Override manually here only if you need a non-standard combination.
ENABLE_BASIC_MODIFIERS=true
ENABLE_ADVANCED_MODIFIERS=false
ENABLE_EXPERT_MODIFIERS=false
ENABLE_CUSTOM_MODIFIERS=false

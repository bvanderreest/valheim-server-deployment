#!/usr/bin/env bash
# Valheim server manager — Game modifiers and presets
# Reference: https://valheim.fandom.com/wiki/Dedicated_servers
#
# This file controls gameplay difficulty and features for your Valheim server.
# Modify these settings to customize your server experience without changing
# core infrastructure settings (see config.conf for those).

########################################
#      PRESET DIFFICULTY (Optional)    #
########################################

# Choose a preset base (case-insensitive): casual | easy | normal | hard | hardcore | immersive | hammer
# Reference: https://nodecraft.com/guides/valheim/server-modifiers
# Leave empty "" to skip preset and use category modifiers only.
# Presets establish a baseline that category modifiers can override.
PRESET="casual"

########################################
#     CATEGORY MODIFIERS               #
########################################

# Customize specific gameplay aspects. Reference: https://nodecraft.com/guides/valheim/server-modifiers
# Values are case-insensitive.
# Available modifiers:
#   Combat:       veryeasy | easy | hard | veryhard
#   DeathPenalty: casual | veryeasy | easy | hard | hardcore
#   Resources:    muchless | less | more | muchmore | most
#   Raids:        none | muchless | less | more | muchmore
#   Portals:      casual | hard | veryhard
#
# Example configurations:
#   Easy Mode:     Combat=easy DeathPenalty=casual Resources=more Raids=none
#   Hard Mode:     Combat=veryhard DeathPenalty=hardcore Resources=muchless Raids=muchmore
#   Peaceful:      Combat=veryeasy DeathPenalty=casual Raids=none
MODIFIERS=(
  "Combat=hard"
  "DeathPenalty=casual"
  "Resources=more"
  "Raids=none"
  "Portals=normal"
)

########################################
#     BOOLEAN FEATURE TOGGLES          #
########################################

# Optional features (enable by uncommenting). Reference: https://nodecraft.com/guides/valheim/server-modifiers
# Available toggles:
#   nobuildcost    - Remove building material costs
#   passivemobs    - Allow mobs to spawn in peace mode
#   playerevents   - Enable player-triggered events
#   nomap          - Players don't see the full map
SETKEYS=(
  # "nobuildcost"
  # "passivemobs"
  # "playerevents"
  # "nomap"
)

#!/usr/bin/env bash
# Valheim server manager — Game modifiers and presets
# Reference: https://valheim.fandom.com/wiki/Dedicated_servers
#
# This file controls gameplay difficulty and features for your Valheim server.
# Modify these settings to customize your server experience without changing
# core infrastructure settings (see config.conf for those).

########################################
#      PRESET DIFFICULTY (Optional)    #
########################################

# Choose a preset base: Normal|Casual|Easy|Hard|Hardcore|Immersive|Hammer
# Leave empty "" to skip preset and use category modifiers only
# Presets establish a baseline that category modifiers can override
PRESET=""

########################################
#     CATEGORY MODIFIERS               #
########################################

# Customize specific gameplay aspects. Values are case-insensitive.
# Available modifiers:
#   Combat:      normal | easy | hard
#   DeathPenalty: nopenalty | lesspenalty | normal | hard
#   Resources:    muchless | less | normal | more | muchmore
#   Raids:        none | lessfrequent | normal | morefrequent | veryfrequent
#   Portals:      casual | normal | hard | veryhard
#
# Example configurations:
#   Easy Mode:     Combat=easy DeathPenalty=nopenalty Resources=more Raids=none
#   Hard Mode:     Combat=hard DeathPenalty=hard Resources=less Raids=veryfrequent
#   Peaceful:      Combat=easy DeathPenalty=nopenalty Raids=none
MODIFIERS=(
  "Combat=normal"
  "DeathPenalty=hard"
  "Resources=more"
  "Raids=none"
  "Portals=normal"
)

########################################
#     BOOLEAN FEATURE TOGGLES          #
########################################

# Optional features (enable by uncommenting):
#   nobuildcost    - Remove building material costs
#   playerevents   - Enable player-triggered events
#   passivemobs    - Allow mobs to spawn in peace mode
#   nomap          - Players don't see the full map
SETKEYS=(
  # "nomap"
)

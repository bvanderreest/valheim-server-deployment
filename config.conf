#!/usr/bin/env bash
# Valheim server manager — Configuration file

# ================================
# Dynamic Valheim Binary Locations
# ================================

# Determine script directory
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

# -------------------------------
# Load .env if exists
# -------------------------------
if [[ -f "${SCRIPT_DIR}/.env" ]]; then
    set -a
    source "${SCRIPT_DIR}/.env"
    set +a
fi

# -------------------------------
# Check & load modifiers.conf
# -------------------------------
if [[ ! -f "${SCRIPT_DIR}/modifiers.conf" ]]; then
    if [[ -f "${SCRIPT_DIR}/modifiers.example.conf" ]]; then
        cp "${SCRIPT_DIR}/modifiers.example.conf" "${SCRIPT_DIR}/modifiers.conf"
        echo "Created modifiers.conf from modifiers.example.conf. Please review." >&2
    else
        echo "Error: modifiers.conf and modifiers.example.conf not found!" >&2
        exit 1
    fi
fi
source "${SCRIPT_DIR}/modifiers.conf"

# -------------------------------
# Detect SteamCMD
# -------------------------------
if [[ -z "${STEAMCMD_BIN}" ]]; then
    # look for common locations
    STEAMCMD_BIN="$(command -v steamcmd || echo "")"
    if [[ ! -x "${STEAMCMD_BIN}" ]]; then
        # fallback to ~/.steam or ~/steamcmd
        for path in "$HOME/steamcmd/steamcmd.sh" "$HOME/.steam/steamcmd.sh" "/usr/games/steamcmd"; do
            if [[ -x "${path}" ]]; then
                STEAMCMD_BIN="${path}"
                break
            fi
        done
    fi
fi

if [[ ! -x "${STEAMCMD_BIN}" ]]; then
    echo "Warning: SteamCMD not found at '${STEAMCMD_BIN}'. Run 'deploy' to install, or set STEAMCMD_BIN in .env" >&2
fi

# -------------------------------
# Detect Valheim Server Directory
# -------------------------------
if [[ -z "${SERVER_DIR}" ]]; then
    # try common paths
    for path in \
        "$HOME/valheim" \
        "$HOME/.local/share/Steam/steamapps/common/Valheim dedicated server" \
        "$HOME/valheim/server" \
        "$HOME/steamapps/common/Valheim dedicated server"; do
        if [[ -f "${path}/valheim_server.x86_64" ]]; then
            SERVER_DIR="${path}"
            break
        fi
    done
fi

if [[ -z "${SERVER_DIR}" ]]; then
    # Fall back to the default deploy location
    SERVER_DIR="${SCRIPT_DIR}/server"
    echo "Warning: Valheim server directory not found. Defaulting to ${SERVER_DIR}. Run 'deploy' to install, or set SERVER_DIR in .env" >&2
fi

BINARY="${SERVER_DIR}/valheim_server.x86_64"

# -------------------------------
# Detect steamclient.so
# -------------------------------
if [[ -z "${STEAMCLIENT_SO}" ]]; then
    # Check the standard install location first before falling back to a full directory scan
    if [[ -f "${SERVER_DIR}/linux64/steamclient.so" ]]; then
        STEAMCLIENT_SO="${SERVER_DIR}/linux64/steamclient.so"
    else
        STEAMCLIENT_SO="$(find "${SERVER_DIR}" -name steamclient.so 2>/dev/null | head -n1 || true)"
    fi
fi

if [[ -n "${STEAMCLIENT_SO}" && -f "${STEAMCLIENT_SO}" ]]; then
    export LD_LIBRARY_PATH="$(dirname "${STEAMCLIENT_SO}"):$LD_LIBRARY_PATH"
fi

########################################
#      IDENTITY & SERVER NAME          #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SERVER_NAME="${SERVER_NAME:-My-Server}"
WORLD_NAME="${WORLD_NAME:-My-World}"
PASSWORD="${PASSWORD:-Password12}"            # >=5 chars; cannot equal/contain world name

########################################
#           NETWORKING                 #
########################################

# These values will be overridden by .env if present, otherwise use defaults
PORT="${PORT:-2456}"                        # Valheim uses PORT and PORT+1
PUBLIC="${PUBLIC:-0}"                         # 1 listed; 0 hidden (join via IP)
CROSSPLAY="${CROSSPLAY:-true}"                   # true => -crossplay (PlayFab relay)

########################################
#      INSTALLATION PATHS              #
########################################

# SERVER_DIR is auto-detected above (common paths → deploy default → .env override).
# Override by setting SERVER_DIR in .env. Examples:
#   Standard Steam:  /home/{USER}/.local/share/Steam/steamapps/common/Valheim dedicated server
#   Snap Steam:      /home/{USER}/snap/steam/common/.local/share/Steam/steamapps/common/Valheim dedicated server
#   deploy default:  <script dir>/server/
export LD_LIBRARY_PATH="${LD_LIBRARY_PATH}:${SERVER_DIR}/linux64"

########################################
#      DATA, LOGS & BACKUPS            #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SAVEDIR="${SAVEDIR:-/srv/valheim/worlds}"
LOG_DIR="${LOG_DIR:-/srv/valheim/logs}"
LOGFILE="${LOGFILE:-${LOG_DIR}/valheim-server.log}"
PIDFILE="${PIDFILE:-/srv/valheim/valheim.pid}"
BACKUP_DIR="${BACKUP_DIR:-/srv/valheim/backups}"

########################################
#       RESILIENCE & BACKUPS           #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SAVE_INTERVAL="${SAVE_INTERVAL:-300}"                # 5 min autosave (official default is 1800)
BACKUPS_KEEP="${BACKUPS_KEEP:-12}"                  # keep more rolling backups
BACKUP_SHORT="${BACKUP_SHORT:-900}"                 # 15 min between first backups
BACKUP_LONG="${BACKUP_LONG:-3600}"                 # 60 min between subsequent backups

########################################
#         STEAMCMD UPDATE              #
########################################

# These values will be overridden by .env if present, otherwise use defaults
USE_STEAMCMD_UPDATE="${USE_STEAMCMD_UPDATE:-true}"
STEAMCMD_BIN="${STEAMCMD_BIN:-/usr/games/steamcmd}"
STEAM_LOGIN="${STEAM_LOGIN:-anonymous}"          # Switch to your Steam login if anonymous fails

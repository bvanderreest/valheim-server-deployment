#!/usr/bin/env bash
# Valheim server manager — Configuration file

# Source game modifiers (separate files for easy customization)
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
source "${SCRIPT_DIR}/modifiers-base.conf"
source "${SCRIPT_DIR}/modifiers.conf"

# Check if modifiers.conf exists, if not, create it from the example
if [[ ! -f "${SCRIPT_DIR}/modifiers.conf" ]]; then
  if [[ -f "${SCRIPT_DIR}/modifiers.example.conf" ]]; then
    cp "${SCRIPT_DIR}/modifiers.example.conf" "${SCRIPT_DIR}/modifiers.conf"
    echo "Created modifiers.conf from modifiers.example.conf. Please customize settings in modifiers.conf." >&2
  else
    echo "Error: Neither modifiers.conf nor modifiers.example.conf found!" >&2
    exit 1
  fi
fi

# Load environment variables from .env file if it exists
if [[ -f "${SCRIPT_DIR}/.env" ]]; then
  set -a  # Automatically export all variables
  source "${SCRIPT_DIR}/.env"
  set +a
fi

########################################
#      IDENTITY & SERVER NAME          #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SERVER_NAME="${SERVER_NAME:-Lowood-AU}"
WORLD_NAME="${WORLD_NAME:-CrowsNest}"
PASSWORD="${PASSWORD:-c4mpusTime}"            # >=5 chars; cannot equal/contain world name

########################################
#           NETWORKING                 #
########################################

# These values will be overridden by .env if present, otherwise use defaults
PORT="${PORT:-2456}"                        # Valheim uses PORT and PORT+1
PUBLIC="${PUBLIC:-1}"                         # 1 listed; 0 hidden (join via IP)
CROSSPLAY="${CROSSPLAY:-true}"                   # true => -crossplay (PlayFab relay)

########################################
#      INSTALLATION PATHS              #
########################################

# SERVER_DIR="/home/{USER}]/snap/steam/common/.local/share/Steam/steamapps/common/Valheim dedicated server"
# For standard Steam installation, use: /home/{USER}}/valheim/valheim_server
# For snap installation, use: /home/{USER}}/snap/steam/common/.local/share/Steam/steamapps/common/Valheim dedicated server
# For custom installation, specify the full path to your Valheim server directory
SERVER_DIR="${SERVER_DIR:-/home/vdrvalheim/snap/steam/common/.local/share/Steam/steamapps/common/Valheim dedicated server}"
BINARY="${SERVER_DIR}/valheim_server.x86_64"

########################################
#      DATA, LOGS & BACKUPS            #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SAVEDIR="${SAVEDIR:-/srv/valheim/worlds}"
LOG_DIR="${LOG_DIR:-/srv/valheim/logs}"
LOGFILE="${LOGFILE:-${LOG_DIR}/valheim-server.log}"
PIDFILE="${PIDFILE:-/srv/valheim/valheim.pid}"
BACKUP_DIR="${BACKUP_DIR:-/srv/valheim/backups}"

########################################
#       RESILIENCE & BACKUPS           #
########################################

# These values will be overridden by .env if present, otherwise use defaults
SAVE_INTERVAL="${SAVE_INTERVAL:-300}"                # 5 min autosave (official default is 1800)
BACKUPS_KEEP="${BACKUPS_KEEP:-12}"                  # keep more rolling backups
BACKUP_SHORT="${BACKUP_SHORT:-900}"                 # 15 min between first backups
BACKUP_LONG="${BACKUP_LONG:-3600}"                 # 60 min between subsequent backups

########################################
#         STEAMCMD UPDATE              #
########################################

# These values will be overridden by .env if present, otherwise use defaults
USE_STEAMCMD_UPDATE="${USE_STEAMCMD_UPDATE:-true}"
STEAMCMD_BIN="${STEAMCMD_BIN:-/usr/games/steamcmd}"
STEAM_LOGIN="${STEAM_LOGIN:-anonymous}"          # Switch to your Steam login if anonymous fails

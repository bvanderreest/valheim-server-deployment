name: UAT Report
about: Report something you found during testing
labels:
  - triage/new
  - source/uat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing! Describe what you found below.
        Don't worry about categorising it — we'll handle that.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe what went wrong or what felt off
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: What were you doing when it happened?
      placeholder: |
        E.g.:
        1. I opened the app
        2. I tapped on my humidor
        3. The screen went blank
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: E.g. I expected to see my saved cigars
  - type: dropdown
    id: device
    attributes:
      label: What device were you using?
      options:
        - iPhone
        - Android phone
        - iPad / Android tablet
        - Desktop browser
        - Not sure
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings (optional)
      placeholder: Drag and drop images here, or paste a link to a recording

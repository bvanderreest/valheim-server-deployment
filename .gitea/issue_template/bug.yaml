name: Bug Report
about: Something isn't working correctly
labels:
  - bug
  - source/dev
  - triage/new
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical (blocks sprint)
        - P1 — High (must fix this sprint)
        - P2 — Medium (should fix this sprint)
        - P3 — Low (can defer)
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Mobile (iOS)
        - Mobile (Android)
        - Web
        - API
        - All
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      placeholder: Paste screenshots or error output here
